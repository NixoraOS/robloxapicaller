name: Deploy to Deno Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        uses: denoland/deployctl@v1
        with:
          project: robloxapicaller-95
          entrypoint: main.ts  
